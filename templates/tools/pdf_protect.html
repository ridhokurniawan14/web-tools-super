<div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 transition-colors">
    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2 border-b dark:border-gray-700 pb-4">🔒 Protect PDF (Beri Password)</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Kunci file PDF-mu dengan enkripsi AES-256 agar hanya bisa dibuka oleh orang yang memiliki password.</p>

    <div id="dropzone-protect" class="mb-5 border-2 border-dashed border-amber-300 dark:border-amber-600 bg-amber-50 dark:bg-amber-900/20 hover:bg-amber-100 dark:hover:bg-amber-900/40 rounded-xl transition-all relative overflow-hidden group">
        <input type="file" id="pdfProtectInput" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleProtectFile(this.files)">
        <div class="p-6 text-center pointer-events-none">
            <svg class="w-10 h-10 mx-auto text-amber-500 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path></svg>
            <p class="text-amber-700 dark:text-amber-500 font-bold" id="protectFileName">Klik atau Drag & Drop 1 PDF di sini</p>
        </div>
    </div>

    <div class="bg-gray-50 dark:bg-gray-700/50 p-5 rounded-2xl border border-gray-200 dark:border-gray-600 mb-6">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Buat Password:</label>
        <div class="relative">
            <input type="password" id="pdfPassword" placeholder="Masukkan password yang kuat..." 
                   class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500 pr-12">
            
            <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 px-4 text-gray-500 hover:text-amber-600 focus:outline-none">
                <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            </button>
        </div>
        <p class="text-xs text-gray-400 mt-2 flex items-center gap-1">
            <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Awas lupa! Jika password hilang, file tidak bisa dipulihkan.
        </p>
    </div>

    <button onclick="processProtect()" id="btnProtect" disabled class="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-gray-300 dark:disabled:bg-gray-600 text-white font-semibold py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-lg">
        <span>Kunci PDF Sekarang</span>
    </button>
    <div id="loadingProtect" class="hidden text-center mt-3 text-amber-600 dark:text-amber-500 text-sm animate-pulse font-medium">Mengenknkripsi dokumen...</div>
</div>

<script>
    let protectPdfFile = null;

    function handleProtectFile(files) {
        if (files.length === 0) return;
        const file = files[0];
        if (file.type !== "application/pdf") { showToast("File harus PDF bro!", "error"); return; }
        
        protectPdfFile = file;
        document.getElementById('protectFileName').innerText = "✓ " + file.name;
        document.getElementById('btnProtect').disabled = false;
    }

    function togglePasswordVisibility() {
        const input = document.getElementById('pdfPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
        } else {
            input.type = 'password';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    }

    // Drag events
    const dropzoneProtect = document.getElementById('dropzone-protect');
    dropzoneProtect.addEventListener('dragover', (e) => { e.preventDefault(); dropzoneProtect.classList.add('border-amber-500', 'bg-amber-100'); });
    dropzoneProtect.addEventListener('dragleave', () => dropzoneProtect.classList.remove('border-amber-500', 'bg-amber-100'));
    dropzoneProtect.addEventListener('drop', (e) => { e.preventDefault(); dropzoneProtect.classList.remove('border-amber-500', 'bg-amber-100'); handleProtectFile(e.dataTransfer.files); });

    async function processProtect() {
        if (!protectPdfFile) return;
        const password = document.getElementById('pdfPassword').value;
        if (!password) { showToast("Password tidak boleh kosong bro!", "error"); return; }

        const btn = document.getElementById('btnProtect');
        const loading = document.getElementById('loadingProtect');
        btn.classList.add('hidden'); loading.classList.remove('hidden');

        const formData = new FormData();
        formData.append("pdf_file", protectPdfFile);
        formData.append("password", password);

        try {
            const response = await fetch('/protect-pdf', { method: 'POST', body: formData });
            if (response.ok) {
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    showToast((await response.json()).error, "error");
                } else {
                    const url = URL.createObjectURL(await response.blob());
                    const a = document.createElement('a'); a.href = url; a.download = `Locked_${protectPdfFile.name}`;
                    document.body.appendChild(a); a.click(); a.remove(); 
                    showToast("PDF berhasil dikunci!", "success");
                    
                    // Bersihkan input setelah sukses
                    document.getElementById('pdfPassword').value = '';
                }
            } else { showToast("Gagal memproteksi PDF bro.", "error"); }
        } catch (error) { showToast("Koneksi bermasalah bro.", "error"); } 
        finally { btn.classList.remove('hidden'); loading.classList.add('hidden'); }
    }
</script>
