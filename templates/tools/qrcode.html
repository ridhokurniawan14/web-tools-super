<div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 transition-colors">
    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 border-b dark:border-gray-700 pb-4">🔲 Custom QR Code</h2>
    
    <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Teks / URL:</label>
    <input type="text" id="qrText" placeholder="Masukkan URL atau teks bebas..." 
           class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 bg-white dark:bg-gray-700 text-gray-800 dark:text-white dark:placeholder-gray-400">
    
    <div class="flex gap-4 mb-4">
        <div class="w-1/2">
            <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Warna QR:</label>
            <input type="color" id="qrColor" value="#000000" class="w-full h-10 cursor-pointer rounded border dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>
        <div class="w-1/2">
            <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Background:</label>
            <input type="color" id="qrBgColor" value="#ffffff" class="w-full h-10 cursor-pointer rounded border dark:border-gray-600 bg-white dark:bg-gray-700">
        </div>
    </div>

    <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Logo Tengah (Opsional):</label>
    <input type="file" id="qrLogo" accept="image/*" 
           class="w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 dark:file:bg-blue-900/30 file:text-blue-700 dark:file:text-blue-400 hover:file:bg-blue-100 dark:hover:file:bg-blue-900/50 mb-6 bg-gray-50 dark:bg-gray-700 rounded-lg p-2 border border-gray-200 dark:border-gray-600">

    <button onclick="generateQR()" id="btnGenerate"
            class="w-full bg-blue-600 hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors">
        Generate QR Code
    </button>

    <div id="resultContainer" class="mt-4 flex flex-col items-center hidden">
        <img id="qrResult" class="border border-gray-300 dark:border-gray-600 p-2 rounded-lg shadow-sm w-48 h-48 bg-white mb-3">
        <a id="downloadBtn" download="Custom_QRCode.png" 
           class="text-sm bg-green-500 hover:bg-green-600 text-white py-2 px-6 rounded-lg transition-colors font-medium">
           Download Gambar
        </a>
    </div>
</div>

<script>
    async function generateQR() {
        const textInput = document.getElementById('qrText').value;
        const btn = document.getElementById('btnGenerate');
        if (!textInput) { showToast("Isi teksnya dulu bro!", "error"); return; }
        
        btn.innerText = "Processing..."; btn.disabled = true;
        
        const formData = new FormData();
        formData.append("text", textInput);
        formData.append("color", document.getElementById('qrColor').value);
        formData.append("bg_color", document.getElementById('qrBgColor').value);
        
        const logoFile = document.getElementById('qrLogo').files[0];
        if (logoFile) { formData.append("logo", logoFile); }

        try {
            const response = await fetch('/generate-qr', { method: 'POST', body: formData });
            
            if (response.ok) {
                // 1. CEK DULU ISI BALASANNYA APA
                const contentType = response.headers.get("content-type");
                
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    // 2. KALAU ISINYA JSON (Berarti ini surat tilang dari Satpam Anti-Spam)
                    const data = await response.json();
                    showToast(data.error, "error");
                } else {
                    // 3. KALAU BUKAN JSON (Berarti beneran gambar QR Code)
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    document.getElementById('qrResult').src = url;
                    document.getElementById('downloadBtn').href = url;
                    document.getElementById('resultContainer').classList.remove('hidden');
                    showToast("QR Code berhasil dibuat!", "success");
                }
            } else { 
                showToast("Waduh, ada error saat generate QR bro.", "error"); 
            }
        } catch (error) { 
            showToast("Gagal koneksi ke server.", "error"); 
        } finally { 
            btn.innerText = "Generate QR Code"; btn.disabled = false; 
        }
    }
</script>
